<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobility Login</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">

  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: url("assets/images/background.jpg") no-repeat center center fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      padding: 50px 45px;
      border-radius: 16px;
      width: min(460px, 90vw);
      text-align: center;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin: 0 0 15px 0;
      font-size: 26px;
      font-weight: 600;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .btn {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: rgba(255, 255, 255, 0.9);
      color: #000;
      transition: all 0.25s ease;
      font-weight: 600;
    }

    .btn:hover {
      background-color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }

    .status {
      margin-top: 18px;
      font-size: 14px;
      color: #ddd;
      min-height: 18px;
    }

    .footer-note {
      margin-top: 30px;
      font-size: 12px;
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      .overlay {
        padding: 35px 25px;
      }
      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <h1>Mobility Document Generator</h1>

    <p>
      Please authenticate with your Técnico account to access the mobility
      document system.
    </p>

    <button class="btn" id="loginBtn">Login with Técnico</button>


    <div class="footer-note">
      Instituto Superior Técnico · Universidade de Lisboa
    </div>
  </div>

  <script src="scripts/utils.js"></script>
  <script src="scripts/auth.js"></script>
</body>
</html>
