<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage coordinators</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles/dark.css">
  <style>
    body {
      margin: 0;
      padding: 14px;
      font-family: Arial, sans-serif;
      color: #fff;
      background: rgba(0,0,0,0.12);
    }

    .wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: calc(100vh - 28px);
    }

    .top {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.35);
    }

    .title {
      font-weight: 800;
      font-size: 16px;
    }

    .sub {
      opacity: 0.85;
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.4;
    }

    .status {
      opacity: 0.9;
      font-size: 13px;
      min-height: 18px;
      padding-left: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    .card {
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .cardHead {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cardTitle {
      font-weight: 800;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      background: rgba(255,255,255,0.9);
      color: #000;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .btn:hover {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.35);
    }

    .btn.secondary {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
    }

    .btn.secondary:hover {
      background: rgba(255,255,255,0.20);
    }

    .btn.primary {
      background: rgba(140,255,190,0.18);
      color: #fff;
      border: 1px solid rgba(140,255,190,0.28);
    }

    .btn.primary:hover {
      background: rgba(140,255,190,0.26);
    }

    .btn.danger {
      background: rgba(255,80,80,0.18);
      color: #fff;
      border: 1px solid rgba(255,80,80,0.35);
    }

    .btn.danger:hover {
      background: rgba(255,80,80,0.26);
    }

    .btn[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .bodyPad {
      padding: 12px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: nowrap;
      align-items: flex-end;
      overflow-x: auto;
    }

    .field {
      flex: 0 0 auto;
      min-width: 220px;
    }

    label {
      font-size: 12px;
      opacity: 0.85;
      font-weight: 800;
    }

    input, select {
      padding: 10px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.25);
      color: #fff;
      outline: none;
      font-weight: 700;
      font-size: 13px;
    }

    input::placeholder {
      color: rgba(255,255,255,0.60);
    }

    .tableWrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 900px;
    }

    thead th {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 2;
      text-align: left;
      font-size: 12px;
      letter-spacing: 0.2px;
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.14);
      white-space: nowrap;
    }

    tbody td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      font-size: 12px;
      vertical-align: top;
      word-break: break-word;
    }

    tbody tr:hover td {
      background: rgba(255,255,255,0.06);
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .pill {
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      white-space: nowrap;
      font-weight: 800;
    }

    .cellActions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .small {
      opacity: 0.85;
      font-size: 12px;
      line-height: 1.4;
    }

    .empty {
      padding: 16px;
      opacity: 0.85;
      font-size: 13px;
    }

    .inputGroup {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: nowrap;
      overflow-x: auto;
    }

    .inputGroup .field {
      min-width: 240px;
    }

    .hintRow {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .hint {
      opacity: 0.8;
      font-size: 12px;
      line-height: 1.35;
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      margin-top: 8px;
    }

    .courseCell {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .courseTag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid rgba(140,255,190,0.28);
      background: rgba(140,255,190,0.10);
      white-space: nowrap;
    }

    .btnEdit {
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(255,255,255,0.10);
      color: #fff;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btnEdit:hover { background: rgba(255,255,255,0.18); }

    #courseModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.55);
      align-items: center;
      justify-content: center;
    }

    #courseModal.open { display: flex; }

    .modalBox {
      background: #1a1a1f;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 18px 20px;
      min-width: 260px;
      max-width: 360px;
      width: 90%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }

    .modalHead {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      padding-bottom: 10px;
    }

    .modalTitle {
      font-size: 13px;
      font-weight: 800;
    }

    .modalClose {
      background: none;
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      opacity: 0.6;
      line-height: 1;
      padding: 2px 6px;
    }

    .modalClose:hover { opacity: 1; }

    .modalBody {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .modalBody label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .modalBody label:hover { background: rgba(255,255,255,0.07); }

    .modalBody input[type=checkbox] {
      width: 15px;
      height: 15px;
      padding: 0;
      flex-shrink: 0;
      accent-color: #8cffc2;
    }

    .previewBox {
      display: none;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px 12px;
      min-width: 260px;
    }

    .previewTitle {
      font-weight: 900;
      font-size: 12px;
      opacity: 0.85;
      margin-bottom: 6px;
    }

    .previewLine {
      font-size: 12px;
      opacity: 0.92;
      line-height: 1.35;
    }

    .badgeOk {
      border: 1px solid rgba(140,255,190,0.28);
      background: rgba(140,255,190,0.12);
    }

    .badgeWarn {
      border: 1px solid rgba(255,200,90,0.35);
      background: rgba(255,200,90,0.14);
    }

    .badgeErr {
      border: 1px solid rgba(255,80,80,0.35);
      background: rgba(255,80,80,0.12);
    }

    .inputOk {
      border-color: rgba(140,255,190,0.35);
    }

    .inputErr {
      border-color: rgba(255,80,80,0.45);
    }
  </style>
</head>

<body>
    <div class="wrap">
        <div class="cardTitle">Change role by IST ID</div>
        
        <div class="bodyPad">
            <div class="inputGroup">
                <div class="field">
                    <label for="istIdInput">IST ID</label>
                    <input id="istIdInput" placeholder="IST1123456" autocomplete="off" />
                    <div class="hint" id="istHint">User must already exist in the users table</div>
                </div>
                
                <div class="field" style="min-width:200px; max-width:260px;">
                    <label for="roleSelect">New role</label>
                    <select id="roleSelect">
                        <option value="STUDENT">STUDENT</option>
                        <option value="COORDINATOR">COORDINATOR</option>
                        <option value="STAFF"> Administrative Staff</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
                
                <div class="actions" style="align-self:flex-end;">
                    <button class="btn secondary" id="checkBtn" type="button">Check</button>
                    <button class="btn primary" id="promoteBtn" type="button">Apply</button>
                </div>
            </div>

            <div class="hintRow">
                <div class="previewBox" id="userPreview">
          <div class="previewTitle">User</div>
          <div class="previewLine" id="previewName"></div>
          <div class="previewLine" id="previewEmail"></div>
          <div class="previewLine" id="previewRole"></div>
        </div>
    </div>
    
    <div class="status" id="status"></div>
    
    <div class="grid">

      <div class="card" style="flex:1;">
        <div class="cardHead">
          <div class="cardTitle">Admins, Coordinators and Staff</div>
          <div class="actions">
            <span class="pill" id="countPill">0</span>
          </div>
        </div>

        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>IST ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Created</th>
                <th>Updated</th>
                <th>Role</th>
                <th>Courses</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div class="empty" id="empty" style="display:none;">No admins, coordinators or staff found.</div>
      </div>
    </div>
  </div>

  <div id="courseModal">
    <div class="modalBox">
      <div class="modalHead">
        <span class="modalTitle" id="modalTitle">Courses</span>
        <button class="modalClose" id="modalClose" type="button">✕</button>
      </div>
      <div class="modalBody" id="modalBody">Loading…</div>
    </div>
  </div>

  <script src="scripts/utils.js"></script>
  <script>
    let allCourses = [];

    document.getElementById("modalClose").addEventListener("click", () => {
      document.getElementById("courseModal").classList.remove("open");
    });

    document.getElementById("courseModal").addEventListener("click", (e) => {
      if (e.target === document.getElementById("courseModal")) {
        document.getElementById("courseModal").classList.remove("open");
      }
    });

    function setStatus(t) {
      const el = document.getElementById("status");
      if (el) el.textContent = t || "";
    }

    function normIstId(s) {
      return safeText(s).trim();
    }

    async function apiListUsers() {
      const r = await fetch(`${SERVER}/admin_users.php`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "list_users" })
      });
      const data = await r.json().catch(() => null);
      return { ok: r.ok, data };
    }

    async function apiListPrivileged() {
      const r = await fetch(`${SERVER}/admin_users.php`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "list_privileged" })
      });
      const data = await r.json().catch(() => null);
      return { ok: r.ok, data };
    }

    async function apiSetRoleByUserId(userId, role) {
      const r = await fetch(`${SERVER}/admin_users.php`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "set_role", user_id: userId, role })
      });
      const data = await r.json().catch(() => null);
      return { ok: r.ok, data };
    }

    async function apiSetRoleByIstId(istId, role) {
      const r = await fetch(`${SERVER}/admin_users.php`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "set_role_by_istid", ist_id: istId, role })
      });
      const data = await r.json().catch(() => null);
      return { ok: r.ok, data };
    }

    function rolePill(role) {
      const span = document.createElement("span");
      span.className = "pill";
      span.textContent = safeText(role);
      return span;
    }

    function render(rows) {
      const tbody = document.getElementById("tbody");
      const empty = document.getElementById("empty");
      const countPill = document.getElementById("countPill");
      if (!tbody || !empty || !countPill) return;

      tbody.innerHTML = "";

      const list = Array.isArray(rows) ? rows : [];
      countPill.textContent = String(list.length);

      if (list.length === 0) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      list.forEach(row => {
        const tr = document.createElement("tr");

        function tdText(text, cls) {
          const td = document.createElement("td");
          if (cls) td.className = cls;
          td.textContent = safeText(text);
          tr.appendChild(td);
          return td;
        }

        tdText(row.ist_id, "mono");
        tdText(row.name);
        tdText(row.email || "");

        const tdRole = document.createElement("td");
        tdRole.appendChild(rolePill(row.role));
        tr.appendChild(tdRole);

        tdText(row.created_at, "mono");
        tdText(row.updated_at, "mono");

        const tdChange = document.createElement("td");
        const wrap = document.createElement("div");
        wrap.className = "cellActions";

        const sel = document.createElement("select");
        sel.innerHTML = `
          <option value="STUDENT">STUDENT</option>
          <option value="COORDINATOR">COORDINATOR</option>
          <option value="STAFF">Administrative Staff</option>
          <option value="ADMIN">ADMIN</option>
        `;
        sel.value = safeText(row.role);

        const save = document.createElement("button");
        save.className = "btn primary";
        save.type = "button";
        save.textContent = "Save";

        save.addEventListener("click", async () => {
          const userId = row.id;
          const newRole = sel.value;

          setStatus("Saving...");
          save.disabled = true;
          sel.disabled = true;

          const res = await apiSetRoleByUserId(userId, newRole);

          if (!res.ok || !res.data || !res.data.ok) {
            const msg = res.data && res.data.error ? res.data.error : "Save failed";
            setStatus(msg);
            save.disabled = false;
            sel.disabled = false;
            return;
          }

          await loadRows();
        });

        wrap.appendChild(sel);
        wrap.appendChild(save);
        tdChange.appendChild(wrap);
        tr.appendChild(tdChange);

        const tdCourses = document.createElement("td");
        const courseCell = document.createElement("div");
        courseCell.className = "courseCell";

        const tagsWrap = document.createElement("span");
        tagsWrap.style.display = "none";

        const btnEdit = document.createElement("button");
        btnEdit.className = "btnEdit";
        btnEdit.type = "button";
        btnEdit.textContent = "Edit";

        courseCell.appendChild(btnEdit);
        tdCourses.appendChild(courseCell);
        tr.appendChild(tdCourses);

        async function refreshCourseTags(selectedIds) {
          tagsWrap.innerHTML = "";
          if (!allCourses.length) return;
          const set = new Set(selectedIds.map(Number));
          allCourses.filter(c => set.has(Number(c.id))).forEach(c => {
            const tag = document.createElement("span");
            tag.className = "courseTag";
            tag.textContent = c.acronym;
            tagsWrap.appendChild(tag);
          });
          if (!set.size) {
            const none = document.createElement("span");
            none.style.opacity = "0.4";
            none.style.fontSize = "11px";
            none.textContent = "-";
            tagsWrap.appendChild(none);
          }
        }

        let rowSelectedCourses = null;

        btnEdit.addEventListener("click", async () => {
          const modal = document.getElementById("courseModal");
          const modalBody = document.getElementById("modalBody");

          document.getElementById("modalTitle").textContent = safeText(row.name) + " - Courses";
          modalBody.innerHTML = "Loading…";
          modal.classList.add("open");

          if (!allCourses.length) {
            const r2 = await fetch(`${SERVER}/admin_users.php`, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ action: "list_courses" })
            });
            allCourses = (await r2.json()).courses || [];
          }

          const r1 = await fetch(`${SERVER}/admin_users.php`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "get_coordinator_courses", coordinator_id: row.id })
          });
          const selected = (await r1.json()).courses || [];
          const selectedSet = new Set(selected.map(Number));

          refreshCourseTags([...selectedSet]);
          modalBody.innerHTML = "";

          allCourses.forEach(c => {
            const lbl = document.createElement("label");
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.value = c.id;
            cb.checked = selectedSet.has(Number(c.id));

            cb.addEventListener("change", async () => {
              const checked = [...modalBody.querySelectorAll("input[type=checkbox]")]
                .filter(i => i.checked).map(i => parseInt(i.value));
              refreshCourseTags(checked);
              await fetch(`${SERVER}/admin_users.php`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  action: "set_coordinator_courses",
                  coordinator_id: row.id,
                  course_ids: checked
                })
              });
            });

            lbl.appendChild(cb);
            lbl.append(" " + c.acronym + (c.name ? " – " + c.name : ""));
            modalBody.appendChild(lbl);
          });
        });

        tbody.appendChild(tr);
      });
    }
        
    async function loadRows() {
      setStatus("Loading...");
      const res = await apiListPrivileged();

      if (!res.ok || !res.data || !res.data.ok) {
        const msg = res.data && res.data.error ? res.data.error : "Failed to load";
        setStatus(msg);
        render([]);
        return;
      }

      render(res.data.rows || []);
      setStatus(`Loaded ${Array.isArray(res.data.rows) ? res.data.rows.length : 0} users`);
    }

    function setPreviewVisible(on) {
      const box = document.getElementById("userPreview");
      if (!box) return;
      box.style.display = on ? "block" : "none";
    }

    function setInputState(state) {
      const input = document.getElementById("istIdInput");
      if (!input) return;
      input.classList.remove("inputOk", "inputErr");
      if (state === "ok") input.classList.add("inputOk");
      if (state === "err") input.classList.add("inputErr");
    }

    function setHint(text, kind) {
      const hint = document.getElementById("istHint");
      if (!hint) return;

      hint.textContent = text || "";
      hint.classList.remove("badgeOk", "badgeWarn", "badgeErr");

      if (kind === "ok") hint.classList.add("badgeOk");
      if (kind === "warn") hint.classList.add("badgeWarn");
      if (kind === "err") hint.classList.add("badgeErr");
    }

    function fillPreview(row) {
      const nameEl = document.getElementById("previewName");
      const emailEl = document.getElementById("previewEmail");
      const roleEl = document.getElementById("previewRole");

      if (!nameEl || !emailEl || !roleEl) return;

      nameEl.textContent = `Name: ${safeText(row && row.name) || "Unknown"}`;
      emailEl.textContent = `Email: ${safeText(row && row.email) || ""}`;
      roleEl.textContent = `Current role: ${safeText(row && row.role) || ""}`;
    }

    async function checkIstId() {
      const istId = normIstId(document.getElementById("istIdInput").value);
      if (!istId) {
        setInputState("err");
        setHint("Please enter an IST ID", "err");
        setPreviewVisible(false);
        return;
      }

      setStatus("Checking...");
      setInputState("");
      setHint("Checking privileged list...", "warn");
      setPreviewVisible(false);

      const res = await apiListUsers();
      if (!res.ok || !res.data || !res.data.ok) {
        setInputState("err");
        setHint("Failed to check", "err");
        setStatus("Failed to check");
        return;
      }

      const rows = Array.isArray(res.data.rows) ? res.data.rows : [];
      const found = rows.find(r => safeText(r.ist_id).toLowerCase() === istId.toLowerCase());

      if (found) {
        setInputState("ok");
        setHint("User found", "ok");
        fillPreview(found);
        setPreviewVisible(true);
        setStatus("Ready");
        return;
      }

      setInputState("");
      setHint("Not in admins or coordinators list. Apply will still work if user exists.", "warn");
      fillPreview({ name: "Not listed", email: "", role: "" });
      setPreviewVisible(true);
      setStatus("Ready");
    }

    document.getElementById("checkBtn").addEventListener("click", checkIstId);

    document.getElementById("istIdInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        checkIstId();
      }
    });

    document.getElementById("promoteBtn").addEventListener("click", async () => {
      const istIdEl = document.getElementById("istIdInput");
      const btn = document.getElementById("promoteBtn");
      const istId = normIstId(istIdEl.value);
      const role = document.getElementById("roleSelect").value;

      if (!istId) {
        setInputState("err");
        setHint("Please enter an IST ID", "err");
        setStatus("Please enter an IST ID");
        return;
      }

      setStatus("Applying...");
      setHint("Applying role change...", "warn");
      setInputState("");
      btn.disabled = true;

      const prevLabel = btn.textContent;
      btn.textContent = "Applying...";

      const res = await apiSetRoleByIstId(istId, role);
      if (!res.ok || !res.data || !res.data.ok) {
        const msg = res.data && res.data.error ? res.data.error : "Action failed";
        setStatus(msg);
        setHint(msg, "err");
        setInputState("err");
        btn.disabled = false;
        btn.textContent = prevLabel;
        return;
      }

      istIdEl.value = "";
      setHint("Done", "ok");
      setInputState("ok");
      btn.disabled = false;
      btn.textContent = prevLabel;
      setPreviewVisible(false);

      await loadRows();
    });

    loadRows();
  </script>
</body>
</html>
